<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ---- notes two-pane layout ---- */

    .nt-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* sidebar */

    .nt-sidebar {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #f2f3f5;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .nt-sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .nt-tree {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 16px;
    }

    /* tree items */

    .nt-item {
      display: flex;
      align-items: center;
      width: 100%;
      border: none;
      background: none;
      text-align: left;
      padding: 5px 12px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      border-radius: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nt-item:hover { background: rgba(0, 0, 0, 0.05); }
    .nt-item.selected { background: var(--accent); color: #fff; }
    .nt-item.selected:hover { background: var(--accent); }
    .nt-item.selected .caret { color: rgba(255,255,255,0.7); }
    .nt-item.selected .nt-hint { color: rgba(255,255,255,0.65); }

    .nt-dir { font-weight: 500; }

    .nt-section-label {
      padding: 8px 12px 3px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }
    .nt-section-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0 6px;
    }
    .nt-hint {
      font-size: 11px;
      color: var(--muted);
      margin-left: 4px;
      flex-shrink: 0;
    }

    /* editor pane */

    .nt-editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .nt-editor-header {
      display: flex;
      align-items: center;
      padding: 10px 20px 9px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .nt-note-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    /* split body */

    .nt-editor-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #nt-textarea {
      flex: none;
      width: 50%;
      border: none;
      border-radius: 0;
      resize: none;
      padding: 20px 24px;
      font-size: 14px;
      line-height: 1.75;
      font-family: "SF Mono", "Fira Code", ui-monospace, "Courier New", monospace;
      background: var(--surface);
      color: var(--text);
      border-right: 1px solid var(--border);
    }
    #nt-textarea:focus { outline: none; }
    #nt-textarea:disabled { background: var(--bg); }
    #nt-textarea::placeholder { color: var(--muted); }

    /* draggable divider */

    .nt-divider {
      width: 4px;
      flex-shrink: 0;
      background: var(--border);
      cursor: col-resize;
      transition: background 0.15s;
    }
    .nt-divider:hover { background: var(--accent); }
    html.resizing .nt-divider { background: var(--accent); }
    html.resizing * { cursor: col-resize !important; user-select: none !important; }

    /* markdown preview */

    .nt-preview {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      font-size: 14px;
      line-height: 1.75;
      background: var(--surface);
      color: var(--text);
      min-width: 0;
    }
    .nt-preview:empty::before {
      content: "Preview";
      color: var(--muted);
    }

    .nt-preview h1 { font-size: 1.55em; margin: 0.2em 0 0.4em; padding-bottom: 0.2em; border-bottom: 1px solid var(--border); }
    .nt-preview h2 { font-size: 1.25em; margin: 1em 0 0.35em; }
    .nt-preview h3 { font-size: 1.05em; margin: 0.9em 0 0.3em; }
    .nt-preview h4, .nt-preview h5, .nt-preview h6 { font-size: 1em; margin: 0.7em 0 0.2em; }
    .nt-preview p { margin: 0 0 0.75em; }
    .nt-preview a { color: var(--accent); }
    .nt-preview strong { font-weight: 700; }
    .nt-preview del { color: var(--muted); }

    .nt-preview code {
      font-family: "SF Mono", "Fira Code", ui-monospace, monospace;
      font-size: 0.85em;
      background: rgba(0,0,0,0.06);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .nt-preview pre {
      background: #f5f6f7;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      overflow-x: auto;
      margin: 0 0 1em;
    }
    .nt-preview pre code { background: none; padding: 0; font-size: 0.85em; }

    .nt-preview blockquote {
      margin: 0 0 0.75em;
      padding: 0 0 0 14px;
      border-left: 3px solid var(--accent);
      color: var(--muted);
    }
    .nt-preview blockquote p { margin-bottom: 0; }

    .nt-preview ul, .nt-preview ol { margin: 0 0 0.75em; padding-left: 1.6em; }
    .nt-preview li { margin-bottom: 0.15em; }
    .nt-preview li.task-item { list-style: none; margin-left: -1.2em; }
    .nt-preview li.task-item input { margin-right: 6px; }

    .nt-preview hr { border: none; border-top: 1px solid var(--border); margin: 1.2em 0; }
  </style>
</head>
<body>
  <header id="nt-topbar" class="topbar hidden">
    <h1>Notes</h1>
    <span id="nt-folder-name" style="font-size:13px;color:var(--muted)"></span>
    <span class="spacer"></span>
    <span id="nt-status" class="save-status"></span>
    <button id="nt-new-note-btn">+ Note</button>
  </header>

  <section id="nt-welcome" class="screen">
    <div class="welcome-card">
      <h1>Notes</h1>
      <p>Pick a local folder as your vault.<br>
         Every <code>.md</code> file inside becomes a note.<br>
         Sync via iCloud or Dropbox — handled by the OS.</p>
      <p id="nt-welcome-msg" class="welcome-msg"></p>
      <div class="welcome-actions">
        <button id="nt-pick-btn" class="primary">Choose notes folder</button>
      </div>
    </div>
  </section>

  <div id="nt-app" class="nt-layout hidden">
    <nav class="nt-sidebar">
      <div class="nt-sidebar-header">
        <span id="nt-sidebar-title">Notes</span>
        <button class="icon-btn" id="nt-refresh-btn" title="Refresh">↻</button>
      </div>
      <div id="nt-recent"></div>
      <div class="nt-tree" id="nt-tree"></div>
    </nav>

    <div class="nt-editor">
      <div class="nt-editor-header">
        <span class="nt-note-title" id="nt-note-title">Select a note</span>
        <span class="spacer"></span>
        <button class="icon-btn" id="nt-delete-btn" title="Delete note" style="display:none">✕</button>
      </div>
      <div class="nt-editor-body" id="nt-editor-body">
        <textarea id="nt-textarea"
                  placeholder="Select a note from the sidebar…"
                  disabled
                  spellcheck="true"></textarea>
        <div class="nt-divider" id="nt-divider"></div>
        <div class="nt-preview" id="nt-preview"></div>
      </div>
    </div>
  </div>

  <script type="module" src="src/notes/main.js"></script>
</body>
</html>
