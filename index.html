<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apps</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .launcher {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .launcher-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 520px;
    }

    .app-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 28px 24px 24px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .app-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(91, 141, 239, 0.15);
    }

    .app-icon {
      font-size: 32px;
      line-height: 1;
    }

    .app-card h2 {
      margin: 8px 0 0;
      font-size: 16px;
    }

    .app-card p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>My Apps</h1>
  </header>

  <div class="launcher">
    <div class="launcher-grid">
      <a href="kanban.html" class="app-card">
        <div class="app-icon">📋</div>
        <h2>Kanban Lite</h2>
        <p>Personal task board in a single JSON file. Works with iCloud &amp; Dropbox.</p>
      </a>
      <a href="flashcards.html" class="app-card">
        <div class="app-icon">🗂️</div>
        <h2>Flashcards</h2>
        <p>Study any CSV deck. Create cards in a spreadsheet app and load them here.</p>
      </a>
    </div>
  </div>
</body>
</html>
